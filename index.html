<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QCM SQL — Les Bases</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e1a; --surface: #111827; --surface2: #1a2235; --border: #1e2d45;
  --accent: #00e5ff; --accent2: #7c3aed; --green: #22c55e; --red: #ef4444;
  --yellow: #f59e0b; --text: #e2e8f0; --muted: #64748b; --code-bg: #0d1520;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; overflow-x:hidden; }
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image: linear-gradient(rgba(0,229,255,.03) 1px,transparent 1px), linear-gradient(90deg,rgba(0,229,255,.03) 1px,transparent 1px);
  background-size: 40px 40px;
}
.container { max-width:820px; margin:0 auto; padding:40px 20px 80px; position:relative; z-index:1; }
header { text-align:center; margin-bottom:48px; }
.tag { display:inline-block; font-family:'DM Mono',monospace; font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--accent); background:rgba(0,229,255,.08); border:1px solid rgba(0,229,255,.2); padding:4px 14px; border-radius:2px; margin-bottom:16px; }
h1 { font-family:'Syne',sans-serif; font-size:clamp(32px,6vw,56px); font-weight:800; line-height:1; letter-spacing:-1px; background:linear-gradient(135deg,#fff 0%,var(--accent) 60%,var(--accent2) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:12px; }
.subtitle { color:var(--muted); font-size:15px; }

/* TIMER */
.timer-wrap { position:sticky; top:0; z-index:100; background:rgba(10,14,26,.95); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); padding:12px 20px; display:flex; align-items:center; justify-content:space-between; gap:20px; margin:0 -20px 40px; }
.timer-display { font-family:'DM Mono',monospace; font-size:22px; font-weight:500; color:var(--accent); min-width:72px; transition:color .3s; }
.timer-display.warning { color:var(--yellow); }
.timer-display.danger  { color:var(--red); animation:pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
.progress-bar-wrap { flex:1; height:6px; background:var(--surface2); border-radius:99px; overflow:hidden; }
.progress-bar { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:99px; transition:width 1s linear, background .5s; width:100%; }
.progress-bar.warning { background:linear-gradient(90deg,var(--yellow),#f97316); }
.progress-bar.danger  { background:linear-gradient(90deg,var(--red),#dc2626); }
.q-counter { font-family:'DM Mono',monospace; font-size:12px; color:var(--muted); white-space:nowrap; }

/* QUESTION */
.question-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:28px 32px; margin-bottom:20px; animation:fadeIn .35s ease forwards; }
@keyframes fadeIn { from{transform:translateY(8px);opacity:0} to{transform:translateY(0);opacity:1} }
.q-number { font-family:'DM Mono',monospace; font-size:11px; letter-spacing:2px; color:var(--accent); margin-bottom:10px; text-transform:uppercase; }
.q-text { font-size:16px; font-weight:500; line-height:1.6; margin-bottom:20px; }
code { font-family:'DM Mono',monospace; background:var(--code-bg); color:var(--accent); padding:2px 7px; border-radius:4px; font-size:13px; border:1px solid rgba(0,229,255,.15); }
.options { display:flex; flex-direction:column; gap:10px; }
.option { display:flex; align-items:center; gap:14px; padding:13px 18px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; cursor:pointer; transition:all .15s; user-select:none; }
.option:hover { border-color:rgba(0,229,255,.4); background:rgba(0,229,255,.05); }
.option.locked { cursor:default; pointer-events:none; }
.option.correct { border-color:var(--green); background:rgba(34,197,94,.1); }
.option.wrong   { border-color:var(--red);   background:rgba(239,68,68,.08); }
.option-key { font-family:'DM Mono',monospace; font-size:12px; width:28px; height:28px; display:flex; align-items:center; justify-content:center; border-radius:4px; background:rgba(255,255,255,.05); border:1px solid var(--border); flex-shrink:0; color:var(--muted); transition:all .15s; }
.option.correct .option-key { background:var(--green); color:#000; border-color:var(--green); }
.option.wrong   .option-key { background:var(--red);   color:#fff; border-color:var(--red); }
.option-text { font-size:14px; flex:1; line-height:1.5; }
.feedback { font-family:'DM Mono',monospace; font-size:12px; margin-top:14px; padding:10px 14px; border-radius:6px; line-height:1.6; display:none; }
.feedback.show { display:block; }
.feedback.ok { background:rgba(34,197,94,.1); color:var(--green); border:1px solid rgba(34,197,94,.2); }
.feedback.ko { background:rgba(239,68,68,.08); color:#fca5a5; border:1px solid rgba(239,68,68,.2); }
.btn-next { display:none; margin-top:20px; padding:12px 30px; background:var(--accent); color:#000; border:none; border-radius:6px; font-family:'DM Mono',monospace; font-size:13px; font-weight:500; letter-spacing:1px; cursor:pointer; transition:transform .15s, opacity .15s; }
.btn-next:hover { transform:translateY(-1px); opacity:.9; }
.btn-next.show { display:inline-block; }

/* START */
#start-screen { text-align:center; padding:60px 20px; }
.info-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; max-width:500px; margin:0 auto 40px; }
.info-item { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:20px 10px; }
.info-icon { font-size:24px; margin-bottom:8px; }
.info-val  { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; color:var(--accent); }
.info-lbl  { font-size:11px; color:var(--muted); font-family:'DM Mono',monospace; letter-spacing:1px; margin-top:4px; }
.btn-start { padding:16px 56px; background:var(--accent); color:#000; border:none; border-radius:8px; font-family:'Syne',sans-serif; font-size:17px; font-weight:800; letter-spacing:1px; cursor:pointer; transition:transform .2s, box-shadow .2s; box-shadow:0 0 30px rgba(0,229,255,.3); }
.btn-start:hover { transform:translateY(-2px); box-shadow:0 0 50px rgba(0,229,255,.4); }

/* RESULTS */
#results { display:none; text-align:center; }
.score-circle { width:180px; height:180px; margin:0 auto 32px; position:relative; }
.score-circle svg { transform:rotate(-90deg); }
.score-text { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.score-num { font-family:'Syne',sans-serif; font-size:52px; font-weight:800; line-height:1; }
.score-den { font-family:'DM Mono',monospace; font-size:13px; color:var(--muted); }
.result-title { font-family:'Syne',sans-serif; font-size:28px; font-weight:800; margin-bottom:8px; }
.result-sub   { color:var(--muted); font-size:15px; margin-bottom:40px; }
.stats-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:40px; }
.stat-box { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:20px 16px; }
.stat-val   { font-family:'Syne',sans-serif; font-size:28px; font-weight:800; margin-bottom:4px; }
.stat-label { font-size:12px; color:var(--muted); font-family:'DM Mono',monospace; letter-spacing:1px; }
.btn-retry { padding:14px 40px; background:transparent; color:var(--accent); border:1px solid var(--accent); border-radius:6px; font-family:'DM Mono',monospace; font-size:13px; letter-spacing:2px; cursor:pointer; transition:all .2s; }
.btn-retry:hover { background:rgba(0,229,255,.1); }
.review-section { margin-top:48px; text-align:left; }
.review-title { font-family:'Syne',sans-serif; font-size:20px; font-weight:800; color:var(--muted); margin-bottom:20px; border-bottom:1px solid var(--border); padding-bottom:12px; }
.review-item { background:var(--surface); border-radius:10px; padding:18px 22px; margin-bottom:12px; border-left:3px solid var(--green); }
.review-item.ko { border-left-color:var(--red); }
.review-q { font-size:14px; font-weight:500; margin-bottom:8px; }
.review-answer { font-family:'DM Mono',monospace; font-size:12px; color:var(--muted); }
.ok-ans  { color:var(--green); }
.bad-ans { color:var(--red); text-decoration:line-through; }
.good-ans{ color:var(--green); }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="tag">Dataseito · SQL Débutant</div>
    <h1>QCM SQL</h1>
    <p class="subtitle">20 questions · Commandes, Agrégations &amp; Jointures</p>
  </header>

  <div id="start-screen">
    <div class="info-grid">
      <div class="info-item"><div class="info-icon">📋</div><div class="info-val">20</div><div class="info-lbl">Questions</div></div>
      <div class="info-item"><div class="info-icon">⏱</div><div class="info-val">15</div><div class="info-lbl">Minutes</div></div>
      <div class="info-item"><div class="info-icon">🏆</div><div class="info-val">20</div><div class="info-lbl">Points</div></div>
    </div>
    <button class="btn-start" id="btn-start">COMMENCER LE QCM</button>
  </div>

  <div id="quiz-area" style="display:none">
    <div class="timer-wrap">
      <div id="timer-display" class="timer-display">15:00</div>
      <div class="progress-bar-wrap"><div id="timer-bar" class="progress-bar"></div></div>
      <div id="q-counter" class="q-counter">Q1 / 20</div>
    </div>
    <div id="questions-container"></div>
  </div>

  <div id="results">
    <div class="score-circle">
      <svg width="180" height="180" viewBox="0 0 180 180">
        <circle cx="90" cy="90" r="76" fill="none" stroke="var(--border)" stroke-width="10"/>
        <circle id="score-arc" cx="90" cy="90" r="76" fill="none" stroke="var(--accent)" stroke-width="10"
          stroke-linecap="round" stroke-dasharray="477.5" stroke-dashoffset="477.5"/>
      </svg>
      <div class="score-text">
        <div class="score-num" id="score-display">0</div>
        <div class="score-den">/ 20</div>
      </div>
    </div>
    <div class="result-title" id="result-title"></div>
    <div class="result-sub"   id="result-sub"></div>
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-val" id="stat-correct" style="color:var(--green)">0</div><div class="stat-label">BONNES RÉP.</div></div>
      <div class="stat-box"><div class="stat-val" id="stat-wrong"   style="color:var(--red)">0</div><div class="stat-label">MAUVAISES</div></div>
      <div class="stat-box"><div class="stat-val" id="stat-time"    style="color:var(--accent)">--:--</div><div class="stat-label">TEMPS UTILISÉ</div></div>
    </div>
    <button class="btn-retry" id="btn-retry">↺ RECOMMENCER</button>
    <div class="review-section" id="review-section"></div>
  </div>
</div>

<script>
(function () {
  var TOTAL_TIME = 900;

  var questions = [
    { q:"Quelle requête permet de sélectionner <b>toutes</b> les colonnes de la table <code>Vente</code> ?", options:["SELECT Vente FROM *","SELECT * FROM Vente","SELECT ALL Vente","GET * FROM Vente"], answer:1, explanation:"SELECT * FROM Vente retourne toutes les colonnes de la table." },
    { q:"Comment sélectionner uniquement la colonne <code>VenteID</code> depuis la table <code>Vente</code> ?", options:["SELECT Vente.VenteID","SELECT VenteID ON Vente","SELECT VenteID FROM Vente","FETCH VenteID FROM Vente"], answer:2, explanation:"La syntaxe correcte est SELECT colonne FROM table." },
    { q:"Quelle clause permet de <b>limiter</b> les résultats à 3 lignes (SQL Server / T-SQL) ?", options:["SELECT * FROM Vente LIMIT 3","SELECT TOP 3 * FROM Vente","SELECT * FROM Vente ROWNUM = 3","SELECT FIRST 3 * FROM Vente"], answer:1, explanation:"En T-SQL (SQL Server), on utilise TOP n. LIMIT s'utilise en MySQL/PostgreSQL." },
    { q:"Quelle condition filtre toutes les ventes du <code>CLIENT_1</code> ?", options:["WHERE ClientID = CLIENT_1","FILTER ClientID IS 'CLIENT_1'","WHERE ClientID = 'CLIENT_1'","WHERE ClientID LIKE CLIENT_1"], answer:2, explanation:"Les valeurs texte doivent être entourées de guillemets simples dans la clause WHERE." },
    { q:"Comment exclure le <code>CLIENT_1</code> des résultats ?", options:["WHERE ClientID != 'CLIENT_1'","WHERE ClientID NOT 'CLIENT_1'","WHERE ClientID EXCLUDE 'CLIENT_1'","REMOVE ClientID = 'CLIENT_1'"], answer:0, explanation:"!= (ou <>) signifie différent de et permet d'exclure une valeur." },
    { q:"Quelle requête sélectionne les ventes du produit <code>PROD_1</code> ET du <code>CLIENT_1</code> ?", options:["WHERE ClientID = 'CLIENT_1' OR ProduitID = 'PROD_1'","WHERE ClientID = 'CLIENT_1' AND ProduitID = 'PROD_1'","WHERE ClientID = 'CLIENT_1', ProduitID = 'PROD_1'","WHERE ClientID AND ProduitID IN ('CLIENT_1','PROD_1')"], answer:1, explanation:"AND combine deux conditions qui doivent toutes les deux être vraies simultanément." },
    { q:"Quelle clause permet de filtrer plusieurs valeurs d'une même colonne de façon concise ?", options:["WHERE ClientID = 'C1' OR 'C2'","WHERE ClientID BETWEEN 'C1' AND 'C2'","WHERE ClientID IN ('CLIENT_1','CLIENT_2','CLIENT_3')","WHERE ClientID CONTAINS ('CLIENT_1','CLIENT_2')"], answer:2, explanation:"IN teste l'appartenance à une liste, plus lisible que plusieurs OR." },
    { q:"Quelle requête sélectionne les ventes dont le <code>VenteID</code> <b>commence par</b> 10 ?", options:["WHERE VenteID STARTS '10'","WHERE VenteID LIKE '10%'","WHERE VenteID LIKE '%10'","WHERE VenteID = '10*'"], answer:1, explanation:"LIKE '10%' : le % représente zéro ou plusieurs caractères après 10." },
    { q:"Comment trier les ventes par montant de façon <b>décroissante</b> ?", options:["ORDER BY Montant ASC","SORT BY Montant DESC","ORDER BY Montant DESC","ORDER Montant DESCENDING"], answer:2, explanation:"ORDER BY colonne DESC trie du plus grand au plus petit." },
    { q:"Quelle clause retourne la <b>liste unique</b> des clients sans doublons ?", options:["SELECT UNIQUE ClientID FROM Vente","SELECT DISTINCT ClientID FROM Vente","SELECT ClientID NODUPLICATE FROM Vente","SELECT ClientID FROM Vente GROUP"], answer:1, explanation:"DISTINCT élimine les doublons dans le résultat de la requête." },
    { q:"Quelle fonction compte le <b>nombre total</b> d'enregistrements dans <code>Vente</code> ?", options:["SELECT SUM(*) FROM Vente","SELECT TOTAL(*) FROM Vente","SELECT COUNT(*) FROM Vente","SELECT NB(*) FROM Vente"], answer:2, explanation:"COUNT(*) compte toutes les lignes, y compris celles avec des valeurs NULL." },
    { q:"Pour calculer le total des ventes <b>par client</b>, quelle clause est indispensable ?", options:["ORDER BY ClientID","HAVING ClientID","GROUP BY ClientID","PARTITION BY ClientID"], answer:2, explanation:"GROUP BY regroupe les lignes ayant la même valeur pour effectuer l'agrégation par groupe." },
    { q:"Quelle requête calcule le <b>montant moyen</b> des ventes pour chaque client ?", options:["SELECT ClientID, SUM(Montant) FROM Vente GROUP BY ClientID","SELECT ClientID, AVG(Montant) FROM Vente GROUP BY ClientID","SELECT ClientID, MEAN(Montant) FROM Vente GROUP BY ClientID","SELECT ClientID, AVG(Montant) FROM Vente"], answer:1, explanation:"AVG() calcule la moyenne. GROUP BY est nécessaire pour avoir le résultat par client." },
    { q:"Quelle fonction retourne la <b>vente la plus élevée</b> pour chaque client ?", options:["GREATEST(Montant)","TOP(Montant)","MAX(Montant)","UPPER(Montant)"], answer:2, explanation:"MAX() retourne la valeur maximale du groupe." },
    { q:"Comment filtrer les clients avec un CA <b>supérieur à 1 000 000</b> après agrégation ?", options:["WHERE SUM(Montant) > 1000000","HAVING SUM(Montant) > 1000000","FILTER SUM(Montant) > 1000000","GROUP BY ClientID WHERE SUM > 1000000"], answer:1, explanation:"HAVING filtre après l'agrégation. WHERE ne peut pas utiliser les fonctions d'agrégat." },
    { q:"Que retourne un <code>LEFT JOIN</code> ?", options:["Uniquement les lignes communes aux deux tables","Toutes les lignes de la table droite + correspondances","Toutes les lignes de la table gauche + correspondances (NULL si absent à droite)","Le produit cartésien des deux tables"], answer:2, explanation:"LEFT JOIN retourne toutes les lignes de gauche, avec NULL pour les colonnes de droite sans correspondance." },
    { q:"Quel type de jointure retourne <b>uniquement les enregistrements communs</b> aux deux tables ?", options:["LEFT JOIN","RIGHT JOIN","OUTER JOIN","INNER JOIN"], answer:3, explanation:"INNER JOIN ne retourne que les lignes ayant une correspondance dans les deux tables." },
    { q:"Un <code>CROSS JOIN</code> entre une table de 5 lignes et une table de 4 lignes retourne :", options:["5 lignes","4 lignes","9 lignes","20 lignes"], answer:3, explanation:"CROSS JOIN = produit cartésien : 5 x 4 = 20 lignes." },
    { q:"Quelle est la différence entre <code>UNION</code> et <code>UNION ALL</code> ?", options:["UNION ALL fusionne, UNION ne fait pas","UNION supprime les doublons, UNION ALL conserve tout","UNION conserve les doublons, UNION ALL les supprime","Il n'y a aucune différence"], answer:1, explanation:"UNION élimine les doublons (plus lent), UNION ALL conserve tout (plus rapide)." },
    { q:"Pour récupérer le nom des clients ET le montant de leurs ventes depuis deux tables liées :", options:["SELECT * FROM Client, Vente","SELECT NomClient, Montant FROM Client JOIN Vente ON Client.ClientID = Vente.ClientID","SELECT NomClient, Montant FROM Client MERGE Vente","SELECT NomClient FROM Client + SELECT Montant FROM Vente"], answer:1, explanation:"JOIN ... ON lie les deux tables via la clé commune ClientID." }
  ];

  var currentQ = 0, score = 0, secondsLeft = TOTAL_TIME, timeUsed = 0;
  var userAnswers = [], timerInterval = null, answered = false;

  function g(id) { return document.getElementById(id); }
  function pad(n) { return String(n).padStart(2,'0'); }

  function startTimer() {
    updateTimer();
    timerInterval = setInterval(function() {
      secondsLeft--; timeUsed++;
      updateTimer();
      if (secondsLeft <= 0) { clearInterval(timerInterval); showResults(); }
    }, 1000);
  }

  function updateTimer() {
    var el = g('timer-display'), bar = g('timer-bar');
    el.textContent = pad(Math.floor(secondsLeft/60)) + ':' + pad(secondsLeft%60);
    bar.style.width = (secondsLeft / TOTAL_TIME * 100) + '%';
    el.className = 'timer-display' + (secondsLeft<=60 ? ' danger' : secondsLeft<=180 ? ' warning' : '');
    bar.className = 'progress-bar'  + (secondsLeft<=60 ? ' danger' : secondsLeft<=180 ? ' warning' : '');
  }

  function renderQuestion(idx) {
    answered = false;
    var q = questions[idx];
    var L = ['A','B','C','D'];
    g('q-counter').textContent = 'Q' + (idx+1) + ' / ' + questions.length;

    var opts = q.options.map(function(o,i) {
      return '<div class="option" data-idx="'+i+'"><div class="option-key">'+L[i]+'</div><div class="option-text">'+o+'</div></div>';
    }).join('');

    var isLast = idx === questions.length - 1;
    g('questions-container').innerHTML =
      '<div class="question-card">'
      + '<div class="q-number">QUESTION '+(idx+1)+' / '+questions.length+'</div>'
      + '<div class="q-text">'+q.q+'</div>'
      + '<div class="options" id="opts">'+opts+'</div>'
      + '<div class="feedback" id="feedback"></div>'
      + '<button class="btn-next" id="btn-next">'+(isLast ? 'VOIR LES RÉSULTATS →' : 'QUESTION SUIVANTE →')+'</button>'
      + '</div>';

    g('opts').addEventListener('click', function(e) {
      var o = e.target.closest('.option');
      if (!o || answered) return;
      selectOption(parseInt(o.getAttribute('data-idx')));
    });

    g('btn-next').addEventListener('click', function() {
      currentQ++;
      if (currentQ >= questions.length) { clearInterval(timerInterval); showResults(); }
      else { renderQuestion(currentQ); }
    });
  }

  function selectOption(idx) {
    answered = true;
    var q = questions[currentQ];
    userAnswers[currentQ] = idx;
    var opts = g('opts').querySelectorAll('.option');
    opts.forEach(function(o) { o.classList.add('locked'); });
    var fb = g('feedback');
    if (idx === q.answer) {
      opts[idx].classList.add('correct');
      fb.className = 'feedback show ok';
      fb.textContent = '✓ Bonne réponse ! ' + q.explanation;
      score++;
    } else {
      opts[idx].classList.add('wrong');
      opts[q.answer].classList.add('correct');
      fb.className = 'feedback show ko';
      fb.textContent = '✗ Incorrect. ' + q.explanation;
    }
    g('btn-next').classList.add('show');
  }

  function showResults() {
    g('quiz-area').style.display = 'none';
    var r = g('results');
    r.style.display = 'block';
    var pct = score / questions.length;
    g('score-display').textContent = score;
    g('score-arc').style.strokeDashoffset = 477.5 - pct * 477.5;
    g('score-arc').style.stroke = pct >= .8 ? 'var(--green)' : pct >= .5 ? 'var(--yellow)' : 'var(--red)';
    g('stat-correct').textContent = score;
    g('stat-wrong').textContent   = questions.length - score;
    g('stat-time').textContent    = pad(Math.floor(timeUsed/60)) + ':' + pad(timeUsed%60);
    var t = score>=18 ? ['🏆 Excellent !','Vous maîtrisez SQL comme un pro.']
           : score>=14 ? ['👍 Très bien !','Bonne maîtrise des fondamentaux SQL.']
           : score>=10 ? ['📚 Pas mal !','Quelques révisions s\'imposent.']
                       : ['💪 À réviser','Retournez voir le cours et réessayez !'];
    g('result-title').textContent = t[0];
    g('result-sub').textContent   = t[1];

    var html = '<div class="review-title">RÉVISION DES RÉPONSES</div>';
    questions.forEach(function(q, i) {
      var ua = userAnswers[i], ok = ua === q.answer;
      var uaTxt = ua !== undefined ? q.options[ua] : 'Sans réponse';
      html += '<div class="review-item' + (ok ? '' : ' ko') + '">'
        + '<div class="q-number">Q'+(i+1)+'</div>'
        + '<div class="review-q">'+q.q+'</div>'
        + '<div class="review-answer">'
        + (ok
          ? 'Votre réponse : <span class="ok-ans">'+uaTxt+'</span>'
          : 'Votre réponse : <span class="bad-ans">'+uaTxt+'</span> → Bonne réponse : <span class="good-ans">'+q.options[q.answer]+'</span>')
        + '</div></div>';
    });
    g('review-section').innerHTML = html;
  }

  function startQuiz() {
    g('start-screen').style.display = 'none';
    g('quiz-area').style.display = 'block';
    renderQuestion(0);
    startTimer();
  }

  function restartQuiz() {
    currentQ = 0; score = 0; secondsLeft = TOTAL_TIME; timeUsed = 0;
    userAnswers = []; answered = false;
    clearInterval(timerInterval);
    g('results').style.display = 'none';
    g('quiz-area').style.display = 'block';
    renderQuestion(0);
    startTimer();
  }

  g('btn-start').addEventListener('click', startQuiz);
  g('btn-retry').addEventListener('click', restartQuiz);
